{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-100 dark:bg-gray-900 py-16">
    <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-10">
        <div class="flex items-center gap-6 mb-10">
            <div class="w-24 h-24 bg-gradient-to-r from-green-400 to-blue-500 rounded-full flex items-center justify-center text-white text-4xl font-bold">{{ user.username|first|upper }}</div>
            <div>
                <h1 class="text-4xl font-bold text-gray-900 dark:text-white">{{ user.name }}</h1>
                <p class="text-gray-500 dark:text-gray-400">@{{ user.username }}</p>
            </div>
        </div>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-2xl">
                <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-white">Email</h3>
                <p class="text-gray-600 dark:text-gray-300">{{ user.email }}</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-2xl">
                <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-white">Phone</h3>
                <p class="text-gray-600 dark:text-gray-300">{{ user.phone }}</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-2xl">
                <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-white">Location</h3>
                <p class="text-gray-600 dark:text-gray-300">{{ user.location }}</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-2xl">
                <h3 class="font-semibold text-lg mb-2 text-gray-900 dark:text-white">Joined</h3>
                <p class="text-gray-600 dark:text-gray-300">{{ user.date_joined }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
