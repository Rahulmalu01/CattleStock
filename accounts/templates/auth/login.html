{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-100 via-white to-blue-100 dark:from-gray-950 dark:via-gray-900 dark:to-indigo-950 px-4 py-16">
    <div class="w-full max-w-lg bg-white dark:bg-gray-900 rounded-3xl shadow-2xl overflow-hidden border border-gray-200 dark:border-gray-800">
        <div class="bg-gradient-to-r from-green-500 to-green-700 px-10 py-8 text-center">
            <h1 class="text-4xl font-extrabold text-white mb-2">Welcome Back</h1>
            <p class="text-green-100">Login to your CattleCare account</p>
        </div>
        <div class="p-10">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block mb-3 text-sm font-semibold text-gray-700 dark:text-gray-300">Email Address</label>
                    <input type="email"name="email"class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition"placeholder="Enter your email"required>
                </div>
                <div>
                    <label class="block mb-3 text-sm font-semibold text-gray-700 dark:text-gray-300">Password</label>
                    <input type="password"name="password"class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition"placeholder="Enter your password"required>
                </div>
                <div class="flex justify-end">
                    <a href="#" class="text-sm text-green-600 hover:text-green-700 font-medium">Forgot Password?</a>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-green-700 hover:scale-[1.02] transition-all duration-300 text-white py-4 rounded-2xl font-bold text-lg shadow-xl">Login</button>
                <p class="text-center text-gray-600 dark:text-gray-400">
                    Don't have an account?
                    <a href="{% url 'signup' %}"class="text-green-600 hover:text-green-700 font-semibold">Register</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
