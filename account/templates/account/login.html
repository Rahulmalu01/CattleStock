{% extends 'base.html' %}
{% load static %}

{% block title %}Login - CattleCare{% endblock %}

{% block content %}

<!-- Login Form -->
<main class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user text-primary text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-dark" data-translate="login_title">Welcome Back</h1>
                <p class="text-gray-600 mt-2" data-translate="login_subtitle">Sign in to your account</p>
            </div>

            <!-- Form -->
            <form id="loginForm" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" data-translate="login_email">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="text" name="username" id="loginEmail" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="Username or Email" required>
                    </div>
                    <p id="emailError" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" data-translate="login_password">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" id="loginPassword" class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" placeholder="Enter your password" required>
                    </div>
                    <p id="passwordError" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="remember" class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
                        <span class="text-gray-600 text-sm" data-translate="login_remember">Remember me</span>
                    </label>
                    <a href="#" class="text-primary text-sm hover:underline" data-translate="login_forgot">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-primary-dark transition mb-4">
                    <span data-translate="login_button">Sign In</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">or</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button class="bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i class="fab fa-facebook-f"></i>
                    <span class="hidden sm:inline">Facebook</span>
                </button>
                <button class="bg-blue-400 text-white py-3 rounded-lg font-medium hover:bg-blue-500 transition flex items-center justify-center gap-2">
                    <i class="fab fa-google"></i>
                    <span class="hidden sm:inline">Google</span>
                </button>
            </div>

            <!-- Sign Up Link -->
            <p class="text-center text-gray-600">
                <span data-translate="login_no_account">Don't have an account?</span>
                <a href="{% url 'signup' %}" class="text-primary font-medium hover:underline" data-translate="login_signup">Sign up here</a>
            </p>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/translations.js' %}"></script>
<script src="{% static 'js/main.js' %}"></script>
{% endblock %}
