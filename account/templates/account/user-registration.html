{% load static %}
{% extends 'base.html' %}

{% block title %}Registration - CattleCare{% endblock %}

{% block content %}

<main class="flex-1 flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-dark">Farm Registration</h1>
                <p class="text-gray-600 mt-2">Register your farm with CattleCare</p>
            </div>

            <form id="registrationForm" method="POST" action="{% url 'farm-registration' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Farm Name</label>
                    <input type="text" name="farm_name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Farm Location</label>
                    <input type="text" name="location" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Number of Cattle</label>
                    <input type="number" name="cattle_count" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" required>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2">Primary Breed</label>
                    <select name="breed" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition" required>
                        <option value="">Select Breed</option>
                        <option value="Gir">Gir</option>
                        <option value="Sahiwal">Sahiwal</option>
                        <option value="Red Sindhi">Red Sindhi</option>
                        <option value="Tharparkar">Tharparkar</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-primary-dark transition mb-4">
                    Register Farm
                </button>
            </form>

            <p class="text-center text-gray-600">
                Already registered?
                <a href="{% url 'login' %}" class="text-primary font-medium hover:underline">Login here</a>
            </p>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_js %}

{% endblock %}
