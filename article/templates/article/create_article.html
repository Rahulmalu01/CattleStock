{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen bg-gray-100 dark:bg-gray-900 py-16 px-4">
    <div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-10">
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-10 text-center">Create New Article</h1>
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block mb-3 text-gray-700 dark:text-gray-300 font-medium">Title</label>
                <input type="text"name="title"class="w-full px-5 py-4 rounded-2xl border bg-gray-50 dark:bg-gray-700 dark:text-white"required>
            </div>
            <div>
                <label class="block mb-3 text-gray-700 dark:text-gray-300 font-medium">Category</label>
                <input type="text" name="category"class="w-full px-5 py-4 rounded-2xl border bg-gray-50 dark:bg-gray-700 dark:text-white" required>
            </div>
            <div>
                <label class="block mb-3 text-gray-700 dark:text-gray-300 font-medium">Image URL</label>
                <input type="url"name="image"class="w-full px-5 py-4 rounded-2xl border bg-gray-50 dark:bg-gray-700 dark:text-white">
            </div>
            <div>
                <label class="block mb-3 text-gray-700 dark:text-gray-300 font-medium">Content</label>
                <textarea name="content"rows="10"class="w-full px-5 py-4 rounded-2xl border bg-gray-50 dark:bg-gray-700 dark:text-white" required></textarea>
            </div>
            <button type="submit"class="w-full bg-gradient-to-r from-green-500 to-green-700 text-white py-4 rounded-2xl font-bold text-lg shadow-xl">Publish Article</button>
        </form>
    </div>
</div>
{% endblock %}
