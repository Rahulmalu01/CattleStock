{% extends 'base.html' %}
{% block title %}Cattle List{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-100 dark:bg-gray-900 p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-bold text-gray-900 dark:text-white">Cattle List</h1>
            <a href="{% url 'add_cattle' %}" class="bg-green-600 text-white px-6 py-3 rounded-2xl">Add Cattle</a>
        </div>
        <div class="grid md:grid-cols-3 gap-8">
            {% for cattle in cattles %}
            <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl overflow-hidden">
                {% if cattle.image %}
                <img src="{{ cattle.image }}" class="w-full h-56 object-cover">
                {% endif %}
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">{{ cattle.name }}</h2>
                    <p class="text-gray-500 mb-2">{{ cattle.breed }}</p>
                    <p class="mb-4">
                        Status:
                        <span class="font-semibold text-green-600">{{ cattle.health_status }}</span>
                    </p>
                    <a href="{% url 'cattle_detail' cattle.cattle_id %}" class="text-green-600 font-bold">View Details →</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
