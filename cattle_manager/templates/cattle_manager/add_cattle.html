{% extends 'base.html' %}
{% load static %}
{% block title %}Add Cattle{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-green-50 via-white to-blue-50 dark:from-gray-950 dark:via-gray-900 dark:to-indigo-950 py-16 px-4 transition-all duration-300">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold text-gray-900 dark:text-white mb-4">Add New Cattle</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">Register and manage your cattle information</p>
        </div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-green-500 via-green-600 to-blue-600 p-8">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md">
                        <i class="fas fa-cow text-white text-3xl"></i>
                    </div>
                    <div>
                        <h2 class="text-3xl font-bold text-white">Cattle Information</h2>
                        <p class="text-green-100">Fill all details carefully</p>
                    </div>
                </div>
            </div>
            <form method="POST" class="p-8 md:p-10 space-y-8">
                {% csrf_token %}
                <div>
                    <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Basic Information</h3>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Cattle ID</label>
                            <input type="text" name="cattle_id" placeholder="COW_001" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Cattle Name</label>
                            <input type="text" name="name" placeholder="Bessie" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Breed</label>
                            <input type="text" name="breed" placeholder="Holstein Friesian" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Age (Years)</label>
                            <input type="number" name="age" placeholder="4" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Weight (KG)</label>
                            <input type="number" step="0.1" name="weight" placeholder="450" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Gender</label>
                            <select name="gender" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div>
                    <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Farm Information</h3>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Select Farm</label>
                            <select name="farm" required class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                                <option value="">Choose Farm</option>
                                {% for farm in farms %}
                                    <option value="{{ farm.id }}">{{ farm.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300 font-semibold mb-3">Image URL</label>
                            <input type="url" name="image" placeholder="https://example.com/cow.jpg" class="w-full px-5 py-4 rounded-2xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                    </div>
                </div>
                <div class="flex flex-col md:flex-row gap-4 pt-6">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-green-500 to-green-700 hover:scale-105 transition-all duration-300 text-white py-4 rounded-2xl font-bold text-lg shadow-2xl">
                        <i class="fas fa-plus-circle mr-2"></i>
                        Add Cattle
                    </button>
                    <a href="{% url 'cattle_list' %}" class="flex-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-all duration-300 text-gray-900 dark:text-white py-4 rounded-2xl font-bold text-lg text-center">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
