{% load static %}
<div class="fixed bottom-6 right-6 z-[9999]">
    <button id="chatbotToggle" class="group relative w-16 h-16 rounded-3xl bg-gradient-to-r from-green-500 via-blue-500 to-purple-500 shadow-2xl hover:scale-110 transition-all duration-300 flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
        <i class="fas fa-robot text-white text-2xl relative z-10"></i>
        <div class="absolute inset-0 rounded-3xl border-4 border-green-400 animate-ping opacity-20"></div>
    </button>
    <div id="chatbotWindow" class="hidden absolute bottom-24 right-0 w-[380px] h-[600px] bg-white dark:bg-gray-900 rounded-[2rem] shadow-[0_20px_80px_rgba(0,0,0,0.35)] border border-gray-200 dark:border-gray-800 overflow-hidden flex flex-col backdrop-blur-2xl">
        <div class="bg-gradient-to-r from-green-500 via-blue-500 to-purple-500 p-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-white/20 flex items-center justify-center">
                    <i class="fas fa-robot text-white text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-white font-bold text-lg">CattleCare AI</h2>
                    <p class="text-green-100 text-sm">Smart Farm Assistant</p>
                </div>
            </div>
            <button id="closeChatbot" class="w-10 h-10 rounded-xl bg-white/20 hover:bg-white/30 flex items-center justify-center transition-all duration-300">
                <i class="fas fa-times text-white"></i>
            </button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-5 space-y-5 bg-gray-50 dark:bg-gray-950">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-green-500 to-blue-500 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-robot text-white"></i>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-sm p-4 shadow-lg max-w-[85%]">
                    <p class="text-gray-800 dark:text-gray-200 text-sm leading-relaxed">
                        Hello 👋<br>
                        I am your CattleCare AI assistant.
                        Ask me about:
                    </p>
                    <ul class="mt-3 text-sm text-gray-600 dark:text-gray-400 space-y-2">
                        <li>• Cattle health</li>
                        <li>• Sensor monitoring</li>
                        <li>• Dashboard help</li>
                        <li>• Alerts & diagnostics</li>
                        <li>• Farm management</li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="px-4 pt-3 flex gap-2 overflow-x-auto bg-gray-50 dark:bg-gray-950">
            <button class="quickQuestion px-4 py-2 rounded-xl bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300 text-sm whitespace-nowrap" data-question="Show my dashboard">Dashboard</button>
            <button class="quickQuestion px-4 py-2 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 text-sm whitespace-nowrap" data-question="Show sensor alerts">Alerts</button>
            <button class="quickQuestion px-4 py-2 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 text-sm whitespace-nowrap" data-question="Device diagnostics">Diagnostics</button>
        </div>
        <div class="p-4 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
            <form id="chatForm" class="flex items-center gap-3">
                <input type="text" id="chatInput" placeholder="Ask something..." class="flex-1 px-5 py-4 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white outline-none focus:ring-2 focus:ring-green-500 transition-all duration-300">
                <button type="submit" class="w-14 h-14 rounded-2xl bg-gradient-to-r from-green-500 via-blue-500 to-purple-500 flex items-center justify-center shadow-xl hover:scale-110 transition-all duration-300">
                    <i class="fas fa-paper-plane text-white"></i>
                </button>
            </form>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const chatbotToggle = document.getElementById('chatbotToggle');
    const chatbotWindow = document.getElementById('chatbotWindow');
    const closeChatbot = document.getElementById('closeChatbot');
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('chatInput');
    const chatMessages = document.getElementById('chatMessages');
    chatbotToggle.addEventListener('click', () => {
        chatbotWindow.classList.toggle('hidden');
    });
    closeChatbot.addEventListener('click', () => {
        chatbotWindow.classList.add('hidden');
    });
    document.querySelectorAll('.quickQuestion').forEach(btn => {
        btn.addEventListener('click', () => {
            sendMessage(btn.dataset.question);
        });
    });
    chatForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;
        sendMessage(message);
        chatInput.value = '';
    });
    function sendMessage(message) {
        const userHTML = `
            <div class="flex justify-end">
                <div class="bg-gradient-to-r from-green-500 via-blue-500 to-purple-500 text-white rounded-2xl rounded-tr-sm px-5 py-3 max-w-[80%] shadow-lg text-sm">${message}</div>
            </div>
        `;
        chatMessages.innerHTML += userHTML;
        chatMessages.scrollTop = chatMessages.scrollHeight;
        fetch('/chatbot/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({message: message})
        })
        .then(response => response.json())
        .then(data => {
            const botHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-r from-green-500 to-blue-500 flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl rounded-tl-sm p-4 shadow-lg max-w-[85%]">
                        <p class="text-gray-800 dark:text-gray-200 text-sm leading-relaxed">${data.response}</p>
                    </div>
                </div>
            `;
            chatMessages.innerHTML += botHTML;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    }
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
});
</script>
